{% extends "base.html" %}

{% block title %}注册 - 中古·回想{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>创建账号</h1>
            <p>加入我们，开始您的二手交易之旅</p>
        </div>
        
        <form id="registerForm" action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label for="username">用户名 <span class="required">*</span></label>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" class="form-control" 
                           placeholder="请输入用户名（2-20个字符）" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">邮箱 <span class="required">*</span></label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" class="form-control" 
                           placeholder="请输入邮箱地址" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="phone">手机号码</label>
                <div class="input-group">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" name="phone" class="form-control" 
                           placeholder="请输入手机号码">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">密码 <span class="required">*</span></label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" class="form-control" 
                           placeholder="请输入密码（至少6位）" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <i class="fas fa-eye" id="eyeIcon1"></i>
                    </button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">确认密码 <span class="required">*</span></label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirm_password" name="confirm_password" 
                           class="form-control" placeholder="请再次输入密码" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                        <i class="fas fa-eye" id="eyeIcon2"></i>
                    </button>
                </div>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="agree" required>
                    <span>我已阅读并同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></span>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> 注册
            </button>
        </form>
        
        <div class="auth-footer">
            <p>已有账号？ <a href="{{ url_for('auth.login') }}">立即登录</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(fieldId) {
    const passwordInput = document.getElementById(fieldId);
    const eyeIcon = fieldId === 'password' ? document.getElementById('eyeIcon1') : document.getElementById('eyeIcon2');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.classList.remove('fa-eye');
        eyeIcon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        eyeIcon.classList.remove('fa-eye-slash');
        eyeIcon.classList.add('fa-eye');
    }
}

// 表单验证
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    if (username.length < 2 || username.length > 20) {
        e.preventDefault();
        alert('用户名长度应在2-20个字符之间');
        return false;
    }
    
    if (password.length < 6) {
        e.preventDefault();
        alert('密码长度至少为6位');
        return false;
    }
    
    if (password !== confirmPassword) {
        e.preventDefault();
        alert('两次输入的密码不一致');
        return false;
    }
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        e.preventDefault();
        alert('请输入有效的邮箱地址');
        return false;
    }
});
</script>
{% endblock %}
