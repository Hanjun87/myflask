{% extends "base.html" %}

{% block title %}编辑商品 - 中古·回想{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <div class="form-header">
            <h1>编辑商品</h1>
            <p>修改商品信息</p>
        </div>
        
        <form id="editForm" action="{{ url_for('items.edit_item', item_id=item.id) }}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">商品标题 <span class="required">*</span></label>
                <input type="text" id="title" name="title" class="form-control" 
                       value="{{ item.title }}" required>
            </div>
            
            <div class="form-row">
                <div class="form-group half">
                    <label for="price">价格 <span class="required">*</span></label>
                    <div class="input-group">
                        <span class="input-prefix">¥</span>
                        <input type="number" id="price" name="price" class="form-control" 
                               value="{{ item.price }}" step="0.01" min="0" required>
                    </div>
                </div>
                
                <div class="form-group half">
                    <label for="category">分类 <span class="required">*</span></label>
                    <select id="category" name="category" class="form-control" required>
                        <option value="">请选择分类</option>
                        <option value="electronics" {% if item.category == '数码电子' %}selected{% endif %}>数码电子</option>
                        <option value="books" {% if item.category == '图书教材' %}selected{% endif %}>图书教材</option>
                        <option value="clothes" {% if item.category == '服装鞋帽' %}selected{% endif %}>服装鞋帽</option>
                        <option value="furniture" {% if item.category == '家具家居' %}selected{% endif %}>家具家居</option>
                        <option value="sports" {% if item.category == '运动户外' %}selected{% endif %}>运动户外</option>
                        <option value="others" {% if item.category == '其他' %}selected{% endif %}>其他</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="location">交易地点</label>
                <input type="text" id="location" name="location" class="form-control" 
                       value="{{ item.location or '' }}">
            </div>
            
            <div class="form-group">
                <label for="description">商品描述 <span class="required">*</span></label>
                <textarea id="description" name="description" class="form-control" rows="6" required>{{ item.description }}</textarea>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-large">
                    <i class="fas fa-save"></i> 保存修改
                </button>
                <a href="{{ url_for('items.item_detail', item_id=item.id) }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
